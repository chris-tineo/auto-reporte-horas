# Bertoni — app ASP.NET Zero "Time Management" (v5.5.0.0). Login SSO Office 365.
# 1) Una vez:  python bot.py --company bertoni --login   (login + MFA a mano)
# 2) Luego:    python bot.py --company bertoni            (semana ISO actual)
#              python bot.py --company bertoni --month 2026-06   (todo un mes)
#
# Las observaciones y los días trabajados de cada semana salen de week_note.txt
# (sección [bertoni]). Las constantes (8h, proyecto, etc.) viven aquí.

name: bertoni
active: true
auth: session
headless: false              # false mientras validamos; true cuando esté estable
url: "https://bstmprod.azurewebsites.net/TimeManagementEntries"

# Form de login de la app (solo existe deslogueado) → detecta sesión expirada.
login_marker: "#LoginForm"

flow: modal_entries

modal_entries:
  date_register: "#dateRegister"                  # fecha del día arriba (página "per day")
  open_modal: "#manualTmeCreateOpenModalButton"   # botón "Create"
  modal: "#TimeManagementEntryCreateModal"        # modal "Create New Time Management Entry"
  add_to_list: "#TimeManagementEntryCreateModal .save-button"   # "Add To List"
  cancel: "#TimeManagementEntryCreateModal .close-button"       # "Cancel" (usado en dry-run)
  save: "#save"                                    # OJO: botón verde "Save" = submit real
  save_per_day: true                              # guarda al cerrar cada día

  # Campos del modal. ${date} = fecha ISO del día, ${note} = observación de la semana.
  fields:
    - { selector: "#newTmeDate",         kind: date,   value: "${date}" }
    - { selector: "#newTmeProject",      kind: select, value: "95" }     # KPI Partners Inc
    - { selector: "#newTmeHours",        kind: fill,   value: "8" }
    - { selector: "#newTmeMinutes",      kind: fill,   value: "0" }
    - { selector: "#newTmeIssueNumber",  kind: fill,   value: "0" }
    - { selector: "#newTmeIssueType",    kind: select, value: "2" }      # Task
    - { selector: "#newTmeHourType",     kind: select, value: "1" }      # Development
    - { selector: "#newTmeObservations", kind: fill,   value: "${note}" }
