# Syneos Health — Oracle Fusion Cloud (fscmUI). Login SSO Microsoft (Azure AD) + MFA.
# Usa sesión persistida.
# 1) Una vez:  python bot.py --company syneos --login   (login Microsoft + MFA a mano)
# 2) Luego corre normal y reutiliza auth/syneos_state.json hasta que expire.

name: syneos
job: syneos                  # grupo: Bertoni + KPI Partners + Syneos = un trabajo
active: true                 # validado: llenado por la API backend de Oracle
auth: session
headless: true               # el flujo no depende de la UI visible

# Pantalla de Time Cards (UI Redwood) — se usa para capturar token + timecard actual.
url: "https://fa-ewms-saasfaprod1.fa.ocs.oraclecloud.com/fscmUI/redwood/time/timecards/landing-page"

# Campo email del login de Microsoft (solo deslogueado) → detecta sesión expirada.
login_marker: "input[name='loginfmt']"

flow: oracle_api

# La UI Redwood NO permite escribir por automatización (grid JET virtualizado).
# En su lugar replicamos la llamada de guardado que la propia UI hace al backend:
# capturamos un token (de la sesión, vía tokenrelay) + el timecard actual por GET,
# y hacemos POST con las entradas nuevas. Verificable por GET. Submit ~quincenal: manual.
oracle_api:
  # El endpoint se deriva en runtime del tráfico (el rv:<UUID> cambia por sesión).
  version: "11.13.18.05:9"
  content_type: "application/vnd.oracle.adf.resourceitem+json"
  hours: 8
  # 'fields' (los 7 timeCardFieldValues: Project/Task/Time Type/etc.) se toman en
  # runtime de una entrada existente del timecard; no hace falta hardcodearlos.
# Contexto: Time Card QUINCENAL; fila pre-cargada "TS Data Mgmt Non-Bill / DataGov /
# Regular Hours". La UI Redwood (grid JET) NO es automatizable (lectura fantasma,
# escritura no cuaja); por eso usamos la API backend. Llenado (TIME_SAVE) escribe
# los días hábiles del período cargado que falten. Submit con --submit (TIME_SUBMIT).
# Nota: el flujo opera sobre el período que carga la UI; para enviar AMBAS quincenas
# el día 24 falta resolver cargar el período anterior (validar el próximo mes).
